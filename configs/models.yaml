# Model Configuration
# Documents model checkpoints evaluated in the ACE-Compression paper.
# Download links are provided for each variant. Hugging Face is the primary
# source; ModelScope links are provided as alternatives where available.
#
# Custom variants (2:4-Sparse, Unstructured-Sparse, Trim) were generated
# from the FP16 parent model using the pruning scripts in compression/pruning_scripts/.
# BNB-4bit is applied at inference time via bitsandbytes (uses FP16 checkpoint).

models:

  - id: Qwen2.5-7B
    family: Qwen2.5
    size: 7B
    license_terms: Apache-2.0
    variants:
      - id: FP16
        type: baseline
        source: Hugging Face
        source_url: https://huggingface.co/Qwen/Qwen2.5-7B-Instruct
        modelscope_url: https://modelscope.cn/models/Qwen/Qwen2.5-7B-Instruct
        checkpoint_dir: Qwen2.5-7B-Instruct
      - id: BNB-4bit
        type: quantization
        source: Applied at inference time via bitsandbytes (uses FP16 checkpoint)
        source_url: https://huggingface.co/Qwen/Qwen2.5-7B-Instruct
        checkpoint_dir: N/A (uses FP16 checkpoint)
      - id: AWQ
        type: quantization
        source: Hugging Face
        source_url: https://huggingface.co/Qwen/Qwen2.5-7B-Instruct-AWQ
        modelscope_url: https://modelscope.cn/models/Qwen/Qwen2.5-7B-Instruct-AWQ
        checkpoint_dir: Qwen2.5-7B-Instruct-AWQ
      - id: GPTQ-INT4
