# Model directory structure (within the artifact tree):
# models/<model-family>/<checkpoint-name>
#
# Users must obtain checkpoints from their sources and place or symlink them
# under the expected paths. See serving/ for per-model startup scripts that
# reference these paths.
#
# Custom variants (2:4-Sparse, Unstructured-Sparse) can be regenerated using
# the pruning scripts under compression/pruning_scripts/<model>/.
# BNB-4bit quantization is applied on-the-fly at inference time via vLLM's
# --quantization bitsandbytes flag and does not require a separate checkpoint.
