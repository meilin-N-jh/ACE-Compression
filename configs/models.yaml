        source_url: https://huggingface.co/Qwen/Qwen2.5-7B-Instruct-GPTQ-Int4
        modelscope_url: https://modelscope.cn/models/Qwen/Qwen2.5-7B-Instruct-GPTQ-Int4
        checkpoint_dir: Qwen2.5-7B-Instruct-GPTQ-Int4
      - id: 2:4-Sparse
        type: pruning
        source: Generated via compression/pruning_scripts/qwen2.5-7b/run_2_4_sparse.py
        source_url: N/A (generated from FP16 checkpoint)
        checkpoint_dir: Qwen2.5-7B-Instruct-2to4-Sparse
      - id: Unstructured-Sparse
