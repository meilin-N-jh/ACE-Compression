# Qwen2.5-32B RoleEval 双语评测配置
# 使用vLLM OpenAI API服务器

models:
  # 1. FP16 基线 (原始精度)
  qwen25_32b_fp16_vllm:
    model_type: "vllm"
    base_url: "http://127.0.0.1:8207"
    model_name: "qwen2.5-32b-fp16"
    max_new_tokens: 5
    temperature: 0.0
    top_p: 1.0

  # 2. BNB 4-bit 量化
  qwen25_32b_bnb_4bit_vllm:
    model_type: "vllm"
    base_url: "http://127.0.0.1:8201"
    model_name: "qwen2.5-32b-bnb-4bit"
    max_new_tokens: 5
    temperature: 0.0
    top_p: 1.0

  # 3. AWQ 4-bit 量化
  qwen25_32b_awq_vllm:
    model_type: "vllm"
    base_url: "http://127.0.0.1:8202"
    model_name: "qwen2.5-32b-awq"
    max_new_tokens: 5
    temperature: 0.0
    top_p: 1.0

  # 4. GPTQ INT4 量化
  qwen25_32b_gptq_int4_vllm:
    model_type: "vllm"
    base_url: "http://127.0.0.1:8206"
    model_name: "qwen2.5-32b-gptq-int4"
    max_new_tokens: 5
    temperature: 0.0
    top_p: 1.0

  # 5. Trim 量化
  qwen25_32b_trim_vllm:
    model_type: "vllm"
    base_url: "http://127.0.0.1:8204"
    model_name: "qwen2.5-32b-trim"
    max_new_tokens: 5
    temperature: 0.0
    top_p: 1.0

  # 6. 2:4 Sparse
  qwen25_32b_2_4_sparse_vllm:
    model_type: "vllm"
    base_url: "http://127.0.0.1:8208"
    model_name: "qwen2.5-32b-2to4-sparse"
    max_new_tokens: 5
    temperature: 0.0
    top_p: 1.0

  # 7. Unstructured Sparse
  qwen25_32b_unstructured_sparse_vllm:
    model_type: "vllm"
    base_url: "http://127.0.0.1:8209"
    model_name: "qwen2.5-32b-unstructured-sparse"
    max_new_tokens: 5
    temperature: 0.0
    top_p: 1.0

# 生成参数（默认值，会被model配置覆盖）
generation_config:
  max_new_tokens: 5
  temperature: 0
  top_p: 1.0
  do_sample: false

# 提示模板（中文/双语通用）
prompt_template: |
  题目：{question}
  A. {option_a}
  B. {option_b}
  C. {option_c}
  D. {option_d}

  只输出正确选项的字母（A/B/C/D），不要输出其他内容：
